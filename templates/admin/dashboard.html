{% extends "base.html" %}

{% block content %}
    <h1>Welcome, Admin 🎉</h1>
    <p><a href="{{ url_for('logout') }}">Logout</a></p>

    <p><a href="{{ url_for('new_post') }}">➕ Add New Post</a></p>
    <h2>All Posts:</h2>
    <ul>
        {% for post in posts %}
            <li>
                <strong>{{ post.title }}</strong> – {{ post.type }} | {{ post.date_posted.strftime('%Y-%m-%d') }}
            </li>
        {% else %}
            <li>No posts found.</li>
        {% endfor %}
    </ul>
{% endblock %}
